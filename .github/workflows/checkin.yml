name: iKuuu Checkin

on:
  schedule:
    - cron: "10 16 * * *"
  workflow_dispatch:

env:
  ACCOUNTS: ${{ secrets.ACCOUNTS }}
  ISSUE_NUMBER: 1

jobs:
  checkin:
    runs-on: ubuntu-22.04
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1.48.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      - name: Random jitter 0-5s
        run: sleep $(( RANDOM % 6 ))
      - name: Run checkin
        run: python playwright_checkin.py
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}

      - name: Post summary to issue (仅失败时)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = 'checkin_result.json';
            if (!fs.existsSync(resultPath)) {
              console.log('结果文件不存在，跳过');
              return;
            }
            const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));

            if (!data.has_failure) {
              console.log('全部成功，跳过 issue 评论');
              return;
            }

            const body = [
              '## ⚠️ iKuuu 签到有失败',
              `运行时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`,
              '```',
              data.summary,
              '```'
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.ISSUE_NUMBER),
                body: body
              });
              console.log('失败通知已发布到 Issue');
            } catch (e) {
              console.log(`评论失败: ${e.message}`);
            }
