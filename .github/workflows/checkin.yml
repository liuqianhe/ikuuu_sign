name: iKuuu Checkin

on:
  schedule:
    - cron: "28 16 * * *"
  workflow_dispatch:

env:
  ACCOUNTS: ${{ secrets.ACCOUNTS }}
  ISSUE_NUMBER: 1

jobs:
  checkin:
    runs-on: ubuntu-22.04
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-v1.48.0
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Random jitter 0-5s
        run: sleep $(( RANDOM % 6 ))

      - name: Run checkin
        run: python playwright_checkin.py
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-result
          path: checkin_result.json

      - name: Post summary to issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = 'checkin_result.json';
            if (!fs.existsSync(resultPath)) {
              console.log('结果文件不存在，跳过');
              return;
            }
            const data = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            const body = [
              '## iKuuu 签到结果',
              `运行时间: ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`,
              '```',
              data.summary,
              '```'
            ].join('\n');

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.ISSUE_NUMBER),
                body: body
              });
              console.log('评论已发布');
            } catch (e) {
              console.log(`评论失败（请确认 Issue #${process.env.ISSUE_NUMBER} 已创建）: ${e.message}`);
            }
